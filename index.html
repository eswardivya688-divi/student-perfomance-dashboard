<!DOCTYPE html>
<html>

<head>
<title>Student Performance Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.controls{
text-align:center;
margin-bottom:30px;
}

select{
padding:10px;
font-size:16px;
border-radius:6px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
}

.card h2{
color:#38bdf8;
margin-top:10px;
}

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-bottom:40px;
}

.chart-box{
background:#1e293b;
padding:20px;
border-radius:10px;
}

canvas{
background:white;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
}

th,td{
padding:12px;
text-align:center;
}

th{
background:#020617;
}

tr:nth-child(even){
background:#334155;
}

</style>

</head>

<body>

<header>
Student Performance Analytics Dashboard
</header>

<div class="container">

<div class="controls">
Select Student:
<select id="studentSelect" onchange="updateCharts()">
<option value="0">Alice</option>
<option value="1">Bob</option>
<option value="2">Charlie</option>
</select>
</div>

<div class="stats">

<div class="card">
<p>Total Subjects</p>
<h2>5</h2>
</div>

<div class="card">
<p>Average Marks</p>
<h2 id="avgMarks">0</h2>
</div>

<div class="card">
<p>Top Subject</p>
<h2 id="topSubject">-</h2>
</div>

<div class="card">
<p>Pass Rate</p>
<h2 id="passRate">0%</h2>
</div>

</div>

<div class="charts">

<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<canvas id="pieChart"></canvas>
</div>

</div>

<table>

<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

<tr><td>Math</td><td id="m1"></td></tr>
<tr><td>Science</td><td id="m2"></td></tr>
<tr><td>English</td><td id="m3"></td></tr>
<tr><td>History</td><td id="m4"></td></tr>
<tr><td>Computer</td><td id="m5"></td></tr>

</table>

</div>

<script>

const subjects=["Math","Science","English","History","Computer"];

const studentData=[
[85,78,92,70,88],
[65,88,75,80,72],
[90,82,85,78,95]
];

let barChart;
let pieChart;

function createCharts(data){

if(barChart){
barChart.destroy();
pieChart.destroy();
}

barChart=new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:subjects,
datasets:[{
label:"Marks",
data:data,
backgroundColor:["#38bdf8","#6366f1","#22c55e","#f59e0b","#ef4444"]
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});

pieChart=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:subjects,
datasets:[{
data:data,
backgroundColor:["#38bdf8","#6366f1","#22c55e","#f59e0b","#ef4444"]
}]
}
});

}

function updateStats(data){

let sum=data.reduce((a,b)=>a+b,0);
let avg=Math.round(sum/data.length);
document.getElementById("avgMarks").textContent=avg;

let maxIndex=data.indexOf(Math.max(...data));
document.getElementById("topSubject").textContent=subjects[maxIndex];

let pass=data.filter(m=>m>=40).length;
let passRate=Math.round((pass/data.length)*100);
document.getElementById("passRate").textContent=passRate+"%";

document.getElementById("m1").textContent=data[0];
document.getElementById("m2").textContent=data[1];
document.getElementById("m3").textContent=data[2];
document.getElementById("m4").textContent=data[3];
document.getElementById("m5").textContent=data[4];

}

function updateCharts(){

let index=document.getElementById("studentSelect").value;
let data=studentData[index];

createCharts(data);
updateStats(data);

}

updateCharts();

</script>

</body>
</html>
